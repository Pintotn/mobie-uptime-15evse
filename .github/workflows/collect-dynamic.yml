name: Recolher estados MOBI.E

on:
  schedule:
    # Frequência mínima suportada pelo agendamento do GitHub Actions.
    # Use um repositório público para não consumir a quota de minutos privados.
     cron: "3-58/5 * * * *"
  workflow_dispatch:

concurrency:
  group: mobie-dynamic-collector
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: read
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      EVSE_FILTER: ${{ vars.EVSE_FILTER }}
      MOBIE_STATIC_URL: https://pgm.mobie.pt/integration/nap/evChargingInfra
      MOBIE_DYNAMIC_URL: https://pgm.mobie.pt/integration/nap/evActualStatus
      TIMEZONE: Europe/Lisbon
      DYNAMIC_FEED_MODE: snapshot
      MISSING_FEEDS_BEFORE_UNKNOWN: "3"
      FEED_STALE_AFTER_SECONDS: "900"
      SAVE_RAW_STATIC: "false"
      SAVE_RAW_DYNAMIC: "false"
      HTTP_TIMEOUT_SECONDS: "180"
      HTTP_MAX_RETRIES: "3"
      USER_AGENT: mobie-uptime-free/0.2
    steps:
      - name: Mostrar horário e tipo de execução
        run: |
          echo "Evento: ${{ github.event_name }}"
          echo "Hora UTC: $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "Hora Lisboa: $(TZ=Europe/Lisbon date '+%Y-%m-%d %H:%M:%S %Z')"

      - name: Obter código
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar aplicação
        run: python -m pip install --disable-pip-version-check ".[postgres]"

      - name: Recolher estados atuais
        run: mobie-uptime collect-dynamic
