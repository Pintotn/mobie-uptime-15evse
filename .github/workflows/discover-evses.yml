name: Descobrir EVSE MOBI.E

on:
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      MOBIE_STATIC_URL: https://pgm.mobie.pt/integration/nap/evChargingInfra
      HTTP_TIMEOUT_SECONDS: "180"
      HTTP_MAX_RETRIES: "3"
      SAVE_RAW_STATIC: "false"
      USER_AGENT: mobie-uptime/0.3.1
    steps:
      - name: Obter código
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar aplicação
        run: python -m pip install --disable-pip-version-check "."

      - name: Criar catálogo CSV
        run: mobie-uptime discover-evses --output reports/mobie_evse_catalog.csv

      - name: Disponibilizar catálogo
        uses: actions/upload-artifact@v4
        with:
          name: catalogo-evse-mobie
          path: reports/mobie_evse_catalog.csv
          retention-days: 7
