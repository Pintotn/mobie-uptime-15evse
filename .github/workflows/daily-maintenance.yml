name: Atualizar cadastro e compactar dados

on:
  schedule:
    - cron: "23 3 * * *"
  workflow_dispatch:

concurrency:
  group: mobie-daily-maintenance
  cancel-in-progress: false

jobs:
  maintain:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      EVSE_FILTER: ${{ vars.EVSE_FILTER }}
      MOBIE_STATIC_URL: https://pgm.mobie.pt/integration/nap/evChargingInfra
      MOBIE_DYNAMIC_URL: https://pgm.mobie.pt/integration/nap/evActualStatus
      TIMEZONE: Europe/Lisbon
      SAVE_RAW_STATIC: "false"
      SAVE_RAW_DYNAMIC: "false"
      HTTP_TIMEOUT_SECONDS: "180"
      HTTP_MAX_RETRIES: "3"
      USER_AGENT: mobie-uptime-free/0.2
    steps:
      - name: Obter código
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar aplicação
        run: python -m pip install --disable-pip-version-check ".[postgres]"

      - name: Atualizar lista de EVSE
        run: mobie-uptime collect-static

      - name: Criar resumos e libertar espaço
        run: mobie-uptime maintain --days 3 --retention-days 14
