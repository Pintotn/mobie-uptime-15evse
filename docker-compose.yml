services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mobie
      POSTGRES_USER: mobie
      POSTGRES_PASSWORD: mobie
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mobie -d mobie"]
      interval: 5s
      timeout: 5s
      retries: 20

  collector:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://mobie:mobie@db:5432/mobie
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - raw_data:/app/data/raw
    restart: unless-stopped

  api:
    build: .
    command: ["uvicorn", "mobie_uptime.api:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://mobie:mobie@db:5432/mobie
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - raw_data:/app/data/raw
    restart: unless-stopped

volumes:
  postgres_data:
  raw_data:
